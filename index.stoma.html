<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BioLab - Simulation Stomates</title>
    <style>
        body { margin: 0; background-color: #fdfae6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .section { display: none; width: 100%; text-align: center; }
        .section.active { display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 25px; border: 3px solid #333; box-shadow: 0 8px 0px #e67e22; max-width: 450px; }
        .btn-jaune { background-color: #ffd740; border: 2px solid #333; border-radius: 20px; padding: 12px 25px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.1em; }
        .badge { border: 2px solid #333; padding: 5px 15px; border-radius: 10px; display: inline-block; font-weight: bold; margin-bottom: 15px; }
        .oculaire { width: 350px; height: 350px; border: 12px solid #222; border-radius: 50%; overflow: hidden; position: relative; background: black; margin: 15px auto; }
        #image-stomate { position: absolute; top: 0; left: 0; height: 100%; cursor: grab; }
        .reglages { background: #eee; padding: 15px; border-radius: 15px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="page-accueil" class="section active">
        <div class="card">
            <h1>Bienvenue en labo !</h1>
            <div class="badge">1bac sc. exp</div><br>
            <button class="btn-jaune" onclick="navigation('page-menu')">Explorer !</button>
        </div>
    </div>

    <div id="page-menu" class="section">
        <div class="card">
            <h2>Que voulez-vous faire ?</h2>
            <button class="btn-jaune" onclick="lancerSimulation('test')">🔬 Test (Simulation)</button>
            <button class="btn-jaune" onclick="lancerSimulation('activite')">🌿 Activité (Stomate 1)</button>
            <button class="btn-jaune" onclick="navigation('page-quiz')">📝 Quiz</button>
            <p><a href="#" onclick="navigation('page-accueil')">Retour Accueil</a></p>
        </div>
    </div>

    <div id="page-labo" class="section">
        <div class="card" style="max-width: 600px;">
            <button onclick="navigation('page-menu')" style="cursor:pointer">⬅ Menu</button>
            <div class="oculaire">
                <img src="stomate.jpg" id="image-stomate">
            </div>
            <div class="reglages">
                <label>Mise au point : </label>
                <input type="range" id="focus" min="0" max="10" value="0">
                <select id="zoom">
                    <option value="1">x100</option>
                    <option value="2">x400</option>
                    <option value="4">x1000</option> </select>
            </div>
        </div>
    </div>

    <div id="page-quiz" class="section">
        <div class="card">
            <h2>Quiz bientôt disponible !</h2>
            <button class="btn-jaune" onclick="navigation('page-menu')">Retour</button>
        </div>
    </div>

    <script>
        const img = document.getElementById('image-stomate');
        const foc = document.getElementById('focus');
        const zoo = document.getElementById('zoom');
        let drag = false, x = 0, y = 0, sx, sy;

        function navigation(id) {
            const pages = document.querySelectorAll('.section');
            pages.forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function lancerSimulation(type) {
            x = 0; y = 0;
            if (type === 'test') {
                img.src = 'stomate.jpg';
                foc.value = 0; 
                zoo.value = 1; 
            } 
            else if (type === 'activite') {
                img.src = 'stomate1.jpg';
                foc.value = 10; // Très flou
                zoo.value = 4;  // Très gros
            }
            updateVisuals();
            navigation('page-labo');
        }

        foc.oninput = updateVisuals;
        zoo.onchange = updateVisuals;

        function updateVisuals() {
            const blurVal = Math.abs(foc.value - 5);
            img.style.filter = `blur(${blurVal}px)`;
            img.style.transform = `translate(${x}px, ${y}px) scale(${zoo.value})`;
        }

        img.onmousedown = (e) => { 
            drag = true; 
            sx = e.clientX - x; 
            sy = e.clientY - y; 
            e.preventDefault(); 
        };
        
        window.onmouseup = () => drag = false;
        
        window.onmousemove = (e) => {
            if (!drag) return;
            x = e.clientX - sx; 
            y = e.clientY - sy;
            updateVisuals();
        };
    </script>
</body>
</html>
